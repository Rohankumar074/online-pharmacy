server:
  port: 8080
spring:
  main:
    web-application-type: reactive
  codec:
    max-in-memory-size: 10MB
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  cloud:
    gateway:
      routes:
        - id: identity
          uri: 'lb://identity-service'
          predicates:
            - Path=/api/auth/**
        - id: catalog
          uri: 'lb://catalog-service'
          predicates:
            - Path=/api/catalog/**
        - id: orders
          uri: 'lb://order-service'
          predicates:
            - Path=/api/orders/**
        - id: admin
          uri: 'lb://admin-service'
          predicates:
            - Path=/api/admin/**
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  tracing:
    sampling:
      probability: 1
  zipkin:
    tracing:
      endpoint: 'http://localhost:9411/api/v2/spans'
