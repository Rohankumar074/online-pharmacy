spring:
  application:
    name: admin-service
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:}"

eureka:
  client:
    service-url:
      defaultZone: "${EUREKA_URL:http://localhost:8761/eureka/}"
  instance:
    prefer-ip-address: true
